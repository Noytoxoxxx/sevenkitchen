<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Seven Kitchen</title>
    <link rel="stylesheet" href="style.css?v=1.2"> <!-- Ajout version pour vider le cache -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <style>
        /* FORCE LE SCROLL VERTICAL */
        html, body {
            overflow-x: hidden !important;
            overflow-y: auto !important; /* Force le scroll */
            height: auto !important;
            min-height: 100vh !important;
            background-color: #0a0a0a;
            margin: 0;
            padding: 0;
            -webkit-overflow-scrolling: touch;
        }

        .main-wrapper {
            height: auto !important;
            min-height: 100vh;
            /* On augmente le padding pour ne pas être mangé par la nav fixed */
            padding: 140px 20px 80px 20px !important; 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* Conteneur principal */
        .contact-container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
            flex-wrap: wrap; /* Permet d'empiler sur mobile */
        }

        .contact-info, .contact-form { 
            flex: 1; 
            min-width: 300px; /* Force l'empilement sur petit écran */
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 30px !important;
            border-radius: 20px;
            text-align: left;
        }

        .info-title {
            color: var(--gold-yellow);
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .info-item { display: flex; align-items: center; margin-bottom: 25px; }
        
        /* Correction des icônes */
        .info-icon-img { 
            width: 30px; 
            height: 30px; 
            margin-right: 15px; 
            object-fit: contain;
            /* Si les images ne chargent pas, on met un fond de secours pour voir le bloc */
            background: rgba(255,215,0,0.1); 
            border-radius: 5px;
        }

        .info-text span { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .info-text p { color: #fff; font-size: 0.95rem; margin: 0; font-weight: 500; }

        /* Champs formulaire */
        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 10px;
            font-size: 16px;
        }

        /* Carte Google Maps */
        .map-section {
            width: 100%;
            max-width: 1100px;
            margin-top: 40px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .map-container {
            width: 100%;
            height: 350px;
            filter: grayscale(1) invert(0.9) contrast(1.2);
        }

        /* Mobile specific fixes */
        @media (max-width: 600px) {
            .main-wrapper h2 { font-size: 2rem !important; }
            .contact-container { gap: 20px; }
            .info-card { padding: 20px !important; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SEVEN KITCHEN</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">La Carte</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <h2 style="color:var(--gold-yellow); margin-bottom: 10px; font-size: 3rem; text-transform: uppercase;" data-aos="fade-down">NOUS CONTACTER</h2>

        <div class="contact-container">
            <!-- INFOS -->
            <div class="contact-info" data-aos="fade-right">
                <div class="info-card">
                    <h3 class="info-title">Seven Infos</h3>
                    <div class="info-item">
                        <img src="img/pin.png" alt="Adresse" class="info-icon-img">
                        <div class="info-text"><span>Adresse</span><p>7 Rue Dénecourt, Fontainebleau</p></div>
                    </div>
                    <div class="info-item">
                        <img src="img/telephone.png" alt="Téléphone" class="info-icon-img">
                        <div class="info-text"><span>Téléphone</span><p>01 60 39 00 01</p></div>
                    </div>
                    <div class="info-item">
                        <img src="img/horaires.png" alt="Horaires" class="info-icon-img">
                        <div class="info-text"><span>Horaires</span><p>Ouvert 7j/7 : 11h30 - 23h00</p></div>
                    </div>
                </div>
            </div>

            <!-- FORMULAIRE -->
            <div class="contact-form" data-aos="fade-left">
                <form id="contact-form">
                    <input type="text" name="nom" placeholder="Votre Nom" required>
                    <input type="email" name="email" placeholder="Votre Email" required>
                    <textarea name="message" rows="4" placeholder="Comment pouvons-nous vous régaler ?" required></textarea>
                    <button type="submit" id="submit-btn" class="btn-street" style="width:100%; cursor: pointer;">Envoyer</button>
                    <p id="status" style="margin-top: 10px; text-align: center;"></p>
                </form>
            </div>
        </div>

        <!-- GOOGLE MAPS -->
        <div class="map-section" data-aos="fade-up">
            <iframe 
                class="map-container"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2647.7713432095655!2d2.699318176840748!3d48.40334755580005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e5f48f936f4539%3A0x63351336037a346!2s7%20Rue%20D%C3%A9necourt%2C%2077300%20Fontainebleau!5e0!3m2!1sfr!2sfr!4v1700000000000" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>
    </div>

    <!-- MODAL SUCCÈS -->
    <div id="popup-success" class="popup-overlay">
        <div class="popup-content">
            <span class="close-popup" onclick="closePopup()">×</span>
            <h3 style="color:var(--gold-yellow); font-size: 2rem;">Validé !</h3>
            <p style="margin-top:10px; color: #fff;">Message envoyé avec succès.</p>
            <button class="btn-street" style="margin-top:25px; padding: 10px 40px;" onclick="closePopup()">Génial</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        const form = document.getElementById("contact-form");
        const popup = document.getElementById("popup-success");
        const btn = document.getElementById("submit-btn");

        form.addEventListener("submit", async function(event) {
            event.preventDefault();
            btn.innerHTML = "Envoi...";
            btn.disabled = true;

            const data = new FormData(event.target);
            try {
                const response = await fetch("https://formspree.io/f/xnjwlzlr", {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    popup.style.display = "flex";
                    form.reset();
                }
            } catch (error) {
                alert("Erreur lors de l'envoi");
            }
            btn.innerHTML = "Envoyer";
            btn.disabled = false;
        });

        function closePopup() { popup.style.display = "none"; }
    </script>
</body>
</html>
